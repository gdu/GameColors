            margin-left: 6px;
        }

            background: #22222a;
            color: #9a9aa8;
            border: none;
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            transition: background .15s, color .15s;
        }
        .tab.active {
            background: #3d3d4a;
            color: #fff;
            font-weight: 600;
        }
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 20px 0;
        }
        .scheme {
            display: none;
        }
        .scheme.active {
            display: block;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 4px;
        }
        .scene {
            color: #9a9aa8;
            font-size: 13px;
            margin: 0 0 30px;
        }
        .scene b {
            color: #e8e8ed;
        }
        h2 {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2c2c38;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

            padding: 13px 12px;

// --------------------------------------------------------------
// 3. WCAG 对比度计算
// --------------------------------------------------------------
function hexToLinear(hex) {
    hex = hex.replace('#', '');
    const sRGB = parseInt(hex, 16);
    const r = ((sRGB >> 16) & 0xff) / 255;
    const g = ((sRGB >> 8) & 0xff) / 255;
    const b = (sRGB & 0xff) / 255;
    const linearize = c => c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    return 0.2126 * linearize(r) + 0.7152 * linearize(g) + 0.0722 * linearize(b);
}

function contrastRatio(hex1, hex2) {
    const l1 = hexToLinear(hex1);
    const l2 = hexToLinear(hex2);
    const lighter = Math.max(l1, l2);
    const darker = Math.min(l1, l2);
    return (lighter + 0.05) / (darker + 0.05);
}

function ratioHTML(bgHex, fgHex) {
    const ratio = contrastRatio(bgHex, fgHex);
    const cls = ratio < 4.5 ? ' class="low"' : '';
    return `<div class="ratio${cls}">${ratio.toFixed(1)}:1</div>`;
}

// --------------------------------------------------------------
// 4. 渲染函数
// --------------------------------------------------------------
function renderSwatchGrid(containerId, list) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = '';
    list.forEach(([name, hex, fg]) => {
        let border = '';
        if (hex.toUpperCase() === '#FFFFFF') border = 'border:1px solid #ccc;';
        const div = document.createElement('div');
        div.className = 'swatch';
        div.style.cssText = `background:${hex};color:${fg};${border}`;
        div.setAttribute('data-hex', hex);
        div.innerHTML = `
            <div class="name">${name}</div>
            <div class="hex">${hex}</div>
            ${ratioHTML(hex, fg)}
            <span class="copied">已复制</span>
        `;
        el.appendChild(div);
    });
}

function switchScheme(id) {
    document.querySelectorAll('.tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.schemeId === id);
    });
    document.querySelectorAll('.scheme').forEach(p => {
        p.classList.toggle('active', p.id === 'scheme-' + id);
    });
}

// --------------------------------------------------------------
// 7. 导出功能 (TS / C#)
// --------------------------------------------------------------
function toCamel(str) {
    return str.replace(/[()（）·/]/g, ' ').trim().split(/\s+/).map(w => w.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '')).join('');
}
function toPascal(str) {
    const camel = toCamel(str);
    if (!camel) return 'Color';
    return camel.charAt(0).toUpperCase() + camel.slice(1);
}
function hexToRgb(hex) {
    hex = hex.replace('#', '');
    return [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];
}

function exportTs(scheme) {
    let lines = [`// ${scheme.title} 配色方案 · 自动生成`, `export const ColorScheme = {`];
    const used = new Set();
    scheme.groups.forEach(g => {
        lines.push(`  // ${g.title}`);
        const groupPrefix = toCamel(g.title.split('·')[0].trim());
        g.items.forEach(it => {
            let key = toCamel(it[0]) || 'color';
            if (used.has(key)) {
                key = groupPrefix + key.charAt(0).toUpperCase() + key.slice(1);
            }
            used.add(key);
            lines.push(`  ${key}: '${it[1]}',`);
        });
    });
    lines.push(`};`);
    return lines.join('\n');
}

function exportCsharp(scheme) {
    let lines = [`// ${scheme.title} 配色方案 · 自动生成`, `using UnityEngine;`, ``, `public static class ColorScheme`, `{`];
    const used = new Set();
    scheme.groups.forEach(g => {
        lines.push(`    // ${g.title}`);
        const groupPrefix = toPascal(g.title.split('·')[0].trim());
        g.items.forEach(it => {
            let key = toPascal(it[0]) || 'Color';
            if (used.has(key)) {
                key = groupPrefix + key;
            }
            used.add(key);
            const [r, g2, b] = hexToRgb(it[1]);
            lines.push(`    public static readonly Color32 ${key} = new Color32(${r}, ${g2}, ${b}, 255);`);
        });
    });
    lines.push(`}`);
    return lines.join('\n');
}

document.addEventListener('click', function(e) {
    const btn = e.target.closest('.export-btn');
    if (!btn) return;
    const idx = parseInt(btn.dataset.schemeIndex);
    const scheme = schemes[idx];
    if (!scheme) return;

    let text = '';
    if (btn.dataset.target === 'ts') {
        text = exportTs(scheme);
    } else {
        text = exportCsharp(scheme);
    }

    navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✅ 已复制';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = orig;
            btn.classList.remove('copied');
        }, 1800);
    }).catch(() => {});
});

document.addEventListener('click', function(e) {
    const sw = e.target.closest('.swatch');
    if (!sw) return;
    const hex = sw.getAttribute('data-hex');
    if (!hex) return;
    navigator.clipboard.writeText(hex).catch(() => {});
    sw.classList.add('flash');
    setTimeout(() => sw.classList.remove('flash'), 900);
});
</script>
